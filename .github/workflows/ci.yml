name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**'
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**'

jobs:
  build-client:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.step-output.outputs.files }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug lintDebug --stacktrace -DskipFormatKtlint

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: all-apks-in-one(intermediates)
          retention-days: 1
          path: app/build/outputs/apk/debug/*.apk

      - name: Output filenames
        id: step-output
        run: |
          cd app/build/outputs/apk/debug
          files=$(ls *.apk)
          json_array="["
          first_file=true
          for file in $files; do
            if [ "$first_file" = false ]; then
              json_array+=", \"$file\""
            else
              json_array+="\"$file\""
              first_file=false
            fi
          done
          json_array+="]"
          echo "files=$json_array"
          echo "files=$json_array" >> "$GITHUB_OUTPUT"

  upload-apk:
    runs-on: ubuntu-latest
    needs: build-client
    strategy:
      matrix:
        file: ${{ fromJson(needs.build-client.outputs.files) }}
    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: all-apks-in-one(intermediates)
          path: apks
          merge-multiple: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.file }}
          path: apks/${{ matrix.file }}
